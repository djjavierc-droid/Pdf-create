name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project
        working-directory: artifacts/pdf-tools-mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch AndroidManifest — add PDF intent filter
        working-directory: artifacts/pdf-tools-mobile/android/app/src/main
        run: |
          python3 << 'PYEOF'
          import re, sys

          with open('AndroidManifest.xml', 'r') as f:
              content = f.read()

          print('=== BEFORE PATCH ===')
          print(content)

          if 'application/pdf' in content:
              print('=== PDF intent-filter already present, skipping ===')
              sys.exit(0)

          intent_filter = (
              '\n        <intent-filter>\n'
              '            <action android:name="android.intent.action.VIEW"/>\n'
              '            <category android:name="android.intent.category.DEFAULT"/>\n'
              '            <category android:name="android.intent.category.BROWSABLE"/>\n'
              '            <data android:scheme="file" android:mimeType="application/pdf"/>\n'
              '            <data android:scheme="content" android:mimeType="application/pdf"/>\n'
              '        </intent-filter>'
          )

          # Insert before the FIRST </activity> — always belongs to MainActivity in Expo manifests
          patched = content.replace('</activity>', intent_filter + '\n    </activity>', 1)

          if patched == content:
              print('ERROR: could not find </activity> to patch')
              sys.exit(1)

          with open('AndroidManifest.xml', 'w') as f:
              f.write(patched)

          print('=== AFTER PATCH ===')
          print(patched)
          print('=== PDF intent-filter injected successfully ===')
          PYEOF

      - name: Create signing keystore
        run: |
          keytool -genkeypair \
            -keystore /tmp/release.keystore \
            -alias pdftools \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pdftools123 -keypass pdftools123 \
            -dname "CN=Javier Soto, O=PDF Tools, C=CO"

      - name: Configure release signing
        working-directory: artifacts/pdf-tools-mobile/android
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=/tmp/release.keystore" >> gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=pdftools123" >> gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=pdftools" >> gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=pdftools123" >> gradle.properties

      - name: Make Gradlew executable
        working-directory: artifacts/pdf-tools-mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: artifacts/pdf-tools-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-APK
          path: artifacts/pdf-tools-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
