name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project
        working-directory: artifacts/pdf-tools-mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Create signing keystore
        run: |
          keytool -genkeypair \
            -keystore /tmp/release.keystore \
            -alias pdftools \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pdftools123 -keypass pdftools123 \
            -dname "CN=Javier Soto, O=PDF Tools, C=CO"

      - name: Configure release signing
        working-directory: artifacts/pdf-tools-mobile/android
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=/tmp/release.keystore" >> gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=pdftools123" >> gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=pdftools" >> gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=pdftools123" >> gradle.properties

      - name: Make Gradlew executable
        working-directory: artifacts/pdf-tools-mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: artifacts/pdf-tools-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-APK
          path: artifacts/pdf-tools-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
