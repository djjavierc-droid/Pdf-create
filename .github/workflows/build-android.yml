name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install all workspace dependencies
        run: pnpm install

      - name: Generate native Android project
        working-directory: artifacts/pdf-tools-mobile
        run: npx expo prebuild --platform android --clean

      - name: Make Gradlew executable
        working-directory: artifacts/pdf-tools-mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/pdf-tools-mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tools-APK
          path: artifacts/pdf-tools-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
